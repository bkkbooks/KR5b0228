front:
  text: 太上洞淵三昧神呪齋懴謝儀化七
  hash: sha256:da035fa877a6ed665b006b7bfa8d1e574b245d172f41ce6e98405eb4efcf23c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0228_HFL_000-001a, image: hfl/0294/0294-004.png}
body:
  text: 廣成先生杜光庭剛定懴方臣等志心歸命敬禮東方無極太上至真上上太一君三洞天尊次向東方三禮訖懴臣某等謹為某家奉修神呪行道轉神呪妙經首謝罪愆斷截魔瘟清安家國保護人民燒香明燈思神念真歸身歸神歸命東方無上玄老太上洞淵三昧神呪三洞天尊一切神靈仰謝東方九氣青天泰清玄元無上三天無極大道太上老君太上丈人天帝君天帝丈人大帝君上皇老人三十九真七十二聖髙玄真君九老仙都君九氣丈人始生青真東華玉寶髙晨大司馬上相青童君元老主仙真人無鞅數量百千萬重道氣千二百官君太清玉陛下青帝九氣玉門神仙四司真人諸天至極上聖大神下謝地下東鄉無極世界五嶽四瀆神仙正真乞丐原赦齋主某家存亡兩世父母宗親七情五欲十惡六根積罪積愆無邊無量從兹懴謝咸冀蕩除俾某家眷等福命延長保安宅宇伏願太上垂恩勑三昧呪王九天力士五帝神兵十方釆女赤弓大卒收滅赤頭殺拘盈子等縱行瘟毒刀兵飢饉疫癘鬼賊一切清蕩真氣薰修元精潤色萬有安樂同一太平稽首歸依願垂生造宣勑明威奉行神呪次祝曰此遣鬼呪誦如衛靈呪法惻惻震威而宣嚴勑十方同懴訖起立宣此謂宣勑明威令神鬼奉行矣不得忽略道言五濁丗有持三洞經吾遣天丁士隨逐衛其形下病萬丈鬼逺離於門庭收除五色氣一切莫令行官事解了了病者差醒醒敢有不遵令魔王收斬形次頌曰如頌吟步虛詠之旋行一周十方同東方弗于提勾芒何青青梵女遊太空八音拂王京大乘超世表十真戲紫庭建福立名齋長夜悉開明正道法鼓動百邪悉摧傾魔王來稽首敢試斬其形迢迢東華天九龍雲輿迎喜神來守户力士交萬靈家親乃得住百鬼不敢聽相與弘至迹俱遊紫鳯城至心歸命敬禮南方無極太上至真上上太一君三洞天尊次向南方三禮訖懴臣某等謹為某家奉修神呪行道轉神呪妙經首謝罪愆斷截魔瘟清安官國保護人民燒香明燈思神念真歸身歸神歸命南方無上玄老太上洞淵三昧神呪三洞天尊一切神靈仰謝南方三氣丹天太清南極皇上老君洞靈玉帝上元禁君三元聖人始老玄真萬福丈人南昌上宫主生司馬太極真人太和老子玄和天赤帝丹靈髙仙萬真諸天至極上聖大神下謝地下南鄉無極世界五嶽四瀆神仙正真乞丐原赦某家三業六情之罪違經犯戒之愆萬品千條咸蒙解釋俾某家存亡貞吉災疫永消伏願太上留恩請勑十方釆女天丁力士烏玄天殺大兵赤卒小吏十方主者收除魔瘟威都樵氏烏塗倫那烏丸鬼等所部小鬼啓諸疾病寒熱瘟瘧霍亂吐痢一切妖邪災害疫厲之鬼急令迸散攝毒收瘟各還方位使民人疾厄悉得痊除真氣薰羞元和養育兆民歡泰咸荷道恩告宣神呪次呪曰道告一切神魔子及魔女有人受吾經汝等當扶助四神莫使來百鬼令速去孟達攝瘟災生如離萊茹官解疾病除吾當遷擢汝若故犯害人真氣自然護次頌曰南方炎帝君八表號閻浮飛軒駕雲輿仙人十真遊玄女乘霄唱金光溢丹軀今日法輪轉梵響震九嵎天王勑魔兵風息雨自休晃晃三光耀百邪深自幽若有干試者刀士斬其頭魔王萬王子殺鬼自來誅興齋及大神魍魎以次收各各不相恕大道正氣流至心歸命敬禮西方無極太上至真上上太一君三洞天尊次向西方三禮訖懺臣某等謹為某家奉修神呪行道轉神呪妙經首謝罪愆斷截魔瘟清安宅宇保護家門燒香明燈思神念真歸身歸神歸命西方無上玄老太上洞淵三昧神呪三洞天尊一切神靈仰謝西方七氣素天泰清西華髙上皇帝太靈元始老君泰素寶後聖帝君三元君金闕七太和玉真西靈金母白帝髙仙四極真人諸天至極上聖大神下謝地下西鄉無極世界五嶽四瀆神仙正真乞丐原赦某家曠劫今生身心口意廣造諸罪自作教人塵沙咎纍並乞消除願某家瘟毒消亡咸蒙歡泰伏乞太上垂恩勑勒九天大兵十方甲卒赤殺力士赤騎功曹使者大驅將軍收除信陵赤烏魍魎生死之鬼冡墓之神都奴烏留子赤目角子鬼並乞蕩除斷絶瘟災即令消滅一切疾病並悉痊差真氣潤色百骸休泰仰荷道恩奉宣神呪次呪曰道君勑下界一切凶惡神歲在壬午次年當甲戌旬赤積暴牛馬烏丸夭人民受經佩籙者天兵護其身死將驅客鬼力士喻家親若不順吾教負石積夜濵次頌曰西方蓐收神號曰為勾尼三光玄太虛朗朗照四維八音三十二魔邪氣自摧今日建福齋然燈照空暉風止雨不降斬妖束姦非敢有干試鬼縛送付天機行道除萬惡功德甚巍巍道德甚精研聖力起死尸百邪歸一正福報汝加誰奉師遵大道積善神自歸愚人不能學智者常依依不惜財寶身貴欲乘空飛至心歸命敬禮北方無極太上至真上上太一君三洞天尊次向北方三禮訖懺臣某等謹為某家奉修神呪行道轉神呪妙經首謝罪愆斷絶魔瘟清安宅宇保護家門燒香明燈思神念真歸身歸神歸命北方無上玄老太上洞淵三昧神呪三洞天尊一切神靈仰謝北方五氣玄天太清上上髙皇玉帝虛皇道君太上老君太上丈人太上大道玉晨君北極真公文始先生黑帝皇老髙玄真人自然童子北神九真斗中大神五靈天人太華九晨髙上萬重諸天至極上聖衆神下謝地下北鄉無極世界五嶽四瀆神仙正真乞丐原赦某家七代見存六親姻族不忠不孝不愛不慈殺盜邪淫惡口兩舌綺語妄言嗔怒慳貪罪若丘山難為縷記以今功德咸乞赦除願某家疫病消除咸蒙休泰伏願太上垂恩勑勒宋就文昌風水將軍四夫大王赤赫天都力士黃英等同共收攝青真大魔弗旦連子黃奴都盧那鬼門户井竈之鬼承伯阿偏然玄子都等瘟毒疫病一切諸鬼並令消散宅舍清靜萬兆康寧咸荷道恩奉宣神呪次呪曰太上有真言勑諸妖魅鬼暴亂號白頭寒熱去瘟尾尋常依木石亦有附山水佩法明能師受籙女男子轉經救官解修齋治病起邪魔敢不從剪滅不恕矣次頌曰北方鬱單越四運開無地號之為玄天乘空記玄軌今日建大齋禁止百惡鬼敢有干試者徘徊住便死太上金口勑玉皇道君旨千妖自然伏萬邪何足比今欲呪魔王小鬼各各憂若欲不去者天丁來下求送付三天曹萬邪不得留一一告下之風止雨自休不從律今者司官斬汝頭至心歸命敬禮東北方無極太上至真上上太一君三洞天尊次向東北方三禮訖懴臣某等謹為某家奉修神呪行道轉神呪妙經首謝罪愆斷截魔瘟請安宅宇保護家眷燒香明燈思神念真歸身歸神歸命東北方無上玄老太上洞淵三昧神呪三洞天尊一切神靈仰謝東北方始青天太清無極虛無自無大道至真上聖靈寶始青老君九天真王東明虛皇帝君九靈先生玉華真人季髙帝真諸天至極上聖尊神下謝地下東北方無極世界五嶽四瀆神仙正真乞丐原赦某家師尊父母前代今身廣造諸罪不行忠孝輕忽人恩六度卒修四等無業隂愆陽過釁積溟海以今懴謝咸乞原除願某家瘟毒普消並蒙歡泰伏願太上垂恩勑太上真騎天女玉女太魔犁洪五方十方靈童主者大殺將軍甲卒力士收捕五精七次賈元愼憂等及烏丸黃奴兄弟瘟災一切邪精疫毒訶攝滅逐並令消滅乞某家清安人民休泰仰賴太上罔極之恩奉宣明威驅瘟神呪次呪曰老君弘至教以消中國災戊寅稱附子庚寅名大雷憂連主口舌郝景耗殘財神呪聲一發鬼賊身萬摧金鉞前行誅火鈴後陳催急去千里外不得暫徘徊次頌曰東北艮之子號之曰文靈玄光照一切建齋度衆生齋契乃千載立功遊鳯城度死拯風波靜默欲全形然燈照三光不得令風起太上勑魔王悉令風雨止至心歸命敬禮東南方無極太上至真上上太一君三洞天尊次向東南方三禮訖懴臣某等謹為某家奉修神呪行道轉神呪妙經首謝罪愆斷截魔瘟清安宅宇保護家宅燒香明燈思神念真歸身歸神歸命東南方無上玄老太上洞淵三昧神呪三洞天尊一切神靈仰謝東南方始丹天太清洞極虛無自然至真上聖靈寶始赤陽元老君南方無極老子太和先生三靈玄上萬福皇老丈人丹靈髙皇孟帝太陽真人好生度命司馬玄真三元君紫靈虛皇道君朱宫赤精南昌司命四極真人諸天至極上聖尊神下謝地下東南鄉無極世界五嶽四瀆真人至極上仙正真乞丐原赦某家違誤君親不順天地殺盜邪淫妄言綺語慳貪嗔怒嫉妬賢能隂惡千愆大罪無極因今懴禮特乞消除願某家厄難逺祛咸蒙福慶伏乞太上垂恩告勑三天大兵九天玉女天殺大兵天禁大吏天蓬守士玄中主者正一功曹等攝録收縳百龍剪烏丸李子敖水中射公十二瘧病六畜奴婢鬼等驅除斥逐消滅蕩除令某家和諧欣慶咸樂太平普令一切荷負生成宣勑明威奉行神呪次呪曰老君有明誥遍勑中國邦大鬼與小鬼魔王及邪王歲次甲戌後人衰鬼賊強九月塗倫那三天勾婆羌誦經持籙者魍魎輒形相大上垂正法當滅諸災殃次頌曰東南巽之神遊馳天下河九河振四海五嶽驅汝痾真人啓十方建齋靜玄波百邪不敢起禁勑一切魔若有妖𦍙鬼斬付須陀羅三官伏不起依如女青科至心歸命敬禮西南方無極太上至真上上太一君三洞天尊次向西南方三禮訖懴臣某等謹為某家奉修神呪行道轉神呪妙經首謝罪愆斷截魔瘟清安宅宇保護家門燒香明燈思神念真歸身歸神歸命西南方無上玄老太上洞淵三昧神呪三洞天尊一切神靈仰謝西南方始素天太清玄極虛無自然皓靈上皇上元素靈道君金華至真靈寶始素老君三天玉皇紫陽真公斗中四真元陽帝君紫精先生萬福萬氣萬度萬生君西明太靈虛皇道君金闕素靈七真玉華君諸天至極上聖尊神下謝地下西南鄉無極世界五嶽四瀆神仙正真乞丐原赦某家違犯二儀穢慢三景不崇四序輕侮五常泄露靈文乖違仙聖三元八節十直吉辰縱恣六情造罪無數以今陳首咸乞蕩除願某家福善裝嚴常蒙吉慶伏願太上垂恩勑攝九天大魔太隂官二十四萬人導示君真人尼和萬和士百舌吏九天主者并心同力收攝瘟毒魔王髙鄰子羌胡氐獠赤烏赤連壞軍死將及烏鬼等速令消滅真氣流行萬人安泰宣勑明威奉行神呪次呪曰老君勑群魔皆令伏大道若見轉經人衛護令精好丁靈與羌虜木索并氐獠大頭為大濕夷鬼作乾燥明真持赤棒生如附青草聞呪須急去遲回劈破腦次頌曰西南坤之母伏神告天庭建齋度七世一切長夜明功積升玄都風止雨不行東妖除萬邪天人來下并四運攺劫祚道亦因此生至心歸命敬禮西北方無極太上至真上上太一君三洞天尊次向西北方三禮訖懴臣某等謹為某家奉修神呪行道轉神呪妙經首謝罪愆斷截魔瘟清安宅宇保護家門燒香明燈思神念真歸身歸神歸命西北方無上玄老太上洞淵三昧神呪三洞天尊一切神靈仰謝西北始玄天髙上元皇道君九天元靈洞寶太上真老無量太華靈寶始玄老君皇上天人北玄九蓋華晨君天門度世飛天羽郎玉仙總真監靈司馬上古三師大聖衆至真諸君丈人諸天至極上聖衆神下謝地下西北鄉無極世界五嶽四瀆神仙正真乞丐原赦某家殺盜邪淫慳貪嫉妬嗔恚憎嫉兩語綺言無量罪愆咸乞除蕩存亡兩代並賜安貞伏願太上流恩勑遣九天魔王十方主者三天力士天騶甲卒一切真神收捕邪精五瘟疫毒山林水火風土木索斗枷鬼憂連文慶子等惱害人間者斥去千里皆令蕩滅使真氣流行元精潤育萬人和泰家宅清寧仰荷大道覆育之恩宣勑明威奉行神呪次呪曰太上敷妙經救療萬人病辰巳午未年災毒鬼官盛奉經分劵人得免干時橫赤疫隨呪死黑氣應聲迸不得亂人間勿妄干吾